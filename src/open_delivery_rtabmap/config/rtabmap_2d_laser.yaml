# RTAB-Map: 2D laser + odometry (optional IMU via launch arg imu_topic). No RGB/depth.
/**:
  ros__parameters:
    frame_id: "base_link"
    map_frame_id: "map"
    odom_frame_id: "odom"
    subscribe_depth: false
    subscribe_rgb: false
    subscribe_stereo: false
    subscribe_scan: true
    subscribe_odom: true
    subscribe_user_data: false
    subscribe_odom_info: false
    approx_sync: true
    queue_size: 10
    qos: 2
    qos_camera: 2
    qos_imu: 2
    qos_scan: 2
    qos_odom: 2
    imu_topic: ""
    wait_imu_to_init: false
    delete_db_on_start: true
    "Reg/Strategy": "1"
    "Reg/Force3DoF": "true"
    "RGBD/NeighborLinkRefining": "false"
    "RGBD/ProximityBySpace": "true"
    "Mem/NotLinkedNodesKept": "false"
    "Mem/STMSize": "30"
    "Grid/FromDepth": "false"
    "Grid/RangeMax": "20.0"
    "Grid/RangeMin": "0.0"
    "Grid/CellSize": "0.05"
    "Grid/ClusterRadius": "1.0"
    "Grid/GroundIsObstacle": "false"
