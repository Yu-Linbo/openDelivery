slam_toolbox:
  ros__parameters:
    use_sim_time: true

    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    mode: localization

    map_file_name: ""
    map_start_pose: [0.0, 0.0, 0.0]
    map_start_at_dock: false

    transform_publish_period: 0.02
    minimum_travel_distance: 0.05
    minimum_travel_heading: 0.05
